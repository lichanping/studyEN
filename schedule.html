<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排课总览</title>
    <script type="module">
        import * as commonFunctions from './commonFunctions.js';
        commonFunctions.checkLoginStatus();
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f8fc;
            --card: #ffffff;
            --text: #1f2937;
            --subtle: #6b7280;
            --line: #e5e7eb;
            --accent: #2563eb;
            --chip: #eef2ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1080px;
            margin: 24px auto;
            padding: 0 16px 24px;
        }

        .page-header {
            position: relative;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            text-align: center;
        }

        .top-nav {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px 12px;
            color: var(--text);
            text-decoration: none;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link:hover {
            background: #f3f4f6;
        }

        .hint {
            margin: 0 0 16px;
            color: var(--subtle);
            font-size: 14px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .controls label {
            font-weight: 600;
        }

        .controls input[type="date"] {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 14px;
        }

        .controls input,
        .controls select,
        .controls button {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 14px;
            background: #fff;
        }

        .controls button {
            cursor: pointer;
            font-weight: 600;
        }

        .appointment-title {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 5px 10px;
            background: var(--chip);
            color: #3730a3;
            font-size: 13px;
            font-weight: 600;
        }

        .empty {
            color: var(--subtle);
            font-size: 14px;
        }

        .two-day-grid {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .day-column {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            padding: 10px;
        }

        .day-column-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 10px;
            font-size: 16px;
        }

        .column-list {
            display: grid;
            gap: 10px;
        }

        .class-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: #fff;
        }

        .time {
            font-weight: 700;
            min-width: 72px;
        }

        .inline-time-input {
            width: 88px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 4px 6px;
            font-size: 13px;
            background: #fff;
        }

        .student {
            font-weight: 700;
        }

        .course {
            color: #1d4ed8;
            font-weight: 600;
        }

        .duration {
            color: var(--subtle);
        }

        .class-item.cancelled {
            background: #fff7ed;
            border-color: #fdba74;
        }

        .status-tag {
            border-radius: 999px;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: 700;
            background: #ecfdf5;
            color: #047857;
        }

        .status-tag.cancelled {
            background: #ffedd5;
            color: #c2410c;
        }

        .action-group {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-btn {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            background: #fff;
            cursor: pointer;
            white-space: nowrap;
        }

        .action-btn.cancel {
            color: #b45309;
            border-color: #fdba74;
            background: #fff7ed;
        }

        .action-btn.restore {
            color: #065f46;
            border-color: #6ee7b7;
            background: #ecfdf5;
        }

        .action-btn.remind {
            color: #1d4ed8;
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.9);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            pointer-events: none;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 10px;
            overflow-x: visible;
            padding-bottom: 4px;
        }

        .day-card {
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            padding: 10px;
        }

        @media (max-width: 1200px) {
            .week-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }

        @media (max-width: 900px) {
            .week-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }

        @media (max-width: 680px) {
            .week-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 480px) {
            .week-grid { grid-template-columns: 1fr; }
            .day-card { min-height: auto; padding: 9px; }
            .mini-item { font-size: 12px; }
            .two-day-grid { grid-template-columns: 1fr; }
        }

        .day-card h3 {
            margin: 0 0 8px;
            font-size: 15px;
        }

        .day-meta {
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--subtle);
        }

        .mini-item {
            border-top: 1px dashed var(--line);
            padding-top: 8px;
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .mini-item.cancelled {
            color: #9a3412;
            background: #fff7ed;
            border-radius: 6px;
            padding: 8px;
            border: 1px solid #fdba74;
        }

        .mini-status {
            display: inline-block;
            margin-top: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        .mini-item:first-of-type {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        code {
            background: #f3f4f6;
            border-radius: 5px;
            padding: 1px 5px;
        }

        .quota-result-meta {
            margin-bottom: 8px;
            color: var(--subtle);
            font-size: 13px;
        }

        .quota-result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }

        .quota-result-table th,
        .quota-result-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
        }

        .quota-result-table th {
            background: #f8fafc;
            font-weight: 700;
        }

        .quota-row-warning {
            background: #fff7ed;
        }

        .quota-row-missing {
            background: #fef2f2;
        }

        .quota-status {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            background: #ecfdf5;
            color: #047857;
        }

        .quota-status.warn {
            background: #ffedd5;
            color: #c2410c;
        }

        .quota-status.missing {
            background: #fee2e2;
            color: #b91c1c;
        }

        .quota-cell-danger {
            color: #b91c1c;
            font-weight: 700;
            background: #fff1f2;
        }
    </style>
</head>

<script>
    const WEEK_DAYS = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
    const PERIOD_ORDER = { "上午": 1, "中午": 2, "下午": 3, "晚上": 4 };
    const CANCELLATION_STORAGE_KEY = "schedule-cancellations-v1";
    const TIME_OVERRIDE_STORAGE_KEY = "schedule-time-overrides-v1";
    let cancellationState = {};
    let timeOverrideState = {};

    function getConfig() {
        const raw = document.getElementById("schedule-config").textContent;
        return JSON.parse(raw);
    }

    function toHoursText(minutes) {
        const h = minutes / 60;
        if (Number.isInteger(h)) return h + "小时";
        return h.toFixed(1).replace(".0", "") + "小时";
    }

    function getDayFromDateInput(value) {
        if (!value) return "";
        const date = new Date(value + "T00:00:00");
        const day = date.getDay();
        return WEEK_DAYS[(day + 6) % 7];
    }

    function getDateLabel(value) {
        const date = new Date(value + "T00:00:00");
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + d;
    }

    function addDays(value, days) {
        const date = new Date(value + "T00:00:00");
        date.setDate(date.getDate() + days);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + d;
    }

    function formatTime(entry) {
        return entry.time ? entry.time : entry.period;
    }

    function getEntryId(entry) {
        if (entry.id) return String(entry.id);
        return [
            entry.student,
            entry.course,
            entry.durationMinutes,
            entry.period || "",
            entry.time || "",
            (entry.days || []).join("|")
        ].join("__");
    }

    function getCancellationKey(entry, dateValue) {
        return dateValue + "::" + getEntryId(entry);
    }

    function loadCancellations() {
        try {
            const raw = localStorage.getItem(CANCELLATION_STORAGE_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            if (parsed && typeof parsed === "object") return parsed;
        } catch (error) {
            console.warn("取消状态读取失败，已重置", error);
        }
        return {};
    }

    function saveCancellations() {
        localStorage.setItem(CANCELLATION_STORAGE_KEY, JSON.stringify(cancellationState));
    }

    function loadTimeOverrides() {
        try {
            const raw = localStorage.getItem(TIME_OVERRIDE_STORAGE_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            if (parsed && typeof parsed === "object") return parsed;
        } catch (error) {
            console.warn("时间设置读取失败，已重置", error);
        }
        return {};
    }

    function saveTimeOverrides() {
        localStorage.setItem(TIME_OVERRIDE_STORAGE_KEY, JSON.stringify(timeOverrideState));
    }

    function getTimeOverrideKey(entry, dateValue) {
        return dateValue + "::" + getEntryId(entry);
    }

    function getOverrideClock(entry, dateValue) {
        const key = getTimeOverrideKey(entry, dateValue);
        return timeOverrideState[key] || "";
    }

    function setOverrideClock(entry, dateValue, clock) {
        const key = getTimeOverrideKey(entry, dateValue);
        if (!clock) {
            delete timeOverrideState[key];
        } else {
            timeOverrideState[key] = clock;
        }
        saveTimeOverrides();
    }

    function isCancelled(entry, dateValue) {
        const key = getCancellationKey(entry, dateValue);
        return Boolean(cancellationState[key]);
    }

    function toggleCancellation(entry, dateValue) {
        const key = getCancellationKey(entry, dateValue);
        if (cancellationState[key]) {
            delete cancellationState[key];
        } else {
            cancellationState[key] = { cancelled: true, updatedAt: new Date().toISOString() };
        }
        saveCancellations();
    }

    async function copyTextToClipboard(text) {
        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return true;
            }

            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand("copy");
            document.body.removeChild(textarea);
            return copied;
        } catch (error) {
            console.warn("复制失败", error);
            return false;
        }
    }

    function showToast(message) {
        const oldToast = document.getElementById("scheduleToast");
        if (oldToast) oldToast.remove();

        const toast = document.createElement("div");
        toast.id = "scheduleToast";
        toast.className = "toast";
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 1800);
    }

    function buildAppointmentMessage(entry, dateValue) {
        const dateObj = new Date(dateValue + "T00:00:00");
        const month = dateObj.getMonth() + 1;
        const day = dateObj.getDate();
        const weekDay = "日一二三四五六".charAt(dateObj.getDay());
        const formattedDate = month + "月" + day + "日（周" + weekDay + "）";
        const selectedClock = getOverrideClock(entry, dateValue);
        const classTimeText = selectedClock
            ? (" " + selectedClock)
            : (entry.time ? (" " + entry.time) : (" " + (entry.period || "")));
        return "【排课申请】\n" +
            "学员：【" + entry.student + "】\n" +
            "时间：" + formattedDate + classTimeText + "\n" +
            "课程与时长：" + entry.course + "（" + toHoursText(entry.durationMinutes) + "），谢谢～";
    }

    function getDefaultClockByPeriod(period) {
        const map = {
            "上午": "10:00",
            "中午": "12:00",
            "下午": "15:00",
            "晚上": "20:00"
        };
        return map[period] || "20:00";
    }

    function normalizeClockInput(raw) {
        const value = String(raw || "").trim();
        if (!value) return null;
        if (/^\d{1,2}$/.test(value)) return value.padStart(2, "0") + ":00";
        if (/^\d{1,2}:\d{1,2}$/.test(value)) {
            const [h, m] = value.split(":");
            return h.padStart(2, "0") + ":" + m.padStart(2, "0");
        }
        return null;
    }

    function isValidClock(clock) {
        const parts = clock.split(":").map((n) => Number(n));
        if (parts.length !== 2 || parts.some((n) => !Number.isFinite(n))) return false;
        const [h, m] = parts;
        return h >= 0 && h <= 23 && m >= 0 && m <= 59;
    }

    function buildScheduleNotificationMessage(entry, dateValue, selectedClock) {
        const dateObj = new Date(dateValue + "T00:00:00");
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        const day = String(dateObj.getDate()).padStart(2, "0");
        const weekDay = "日一二三四五六".charAt(dateObj.getDay());
        const classTimeText = selectedClock || (entry.time ? normalizeClockInput(entry.time) : null) || (entry.period || "待确认");

        return "【" + year + "-" + month + "-" + day + "（周" + weekDay + "）" + classTimeText + "】\n" +
            "亲爱的 ✨ " + entry.student + " 家长您好！\n" +
            "🔤 课程名称：《" + entry.course + "》\n" +
            "⏰ 预计时长：" + toHoursText(entry.durationMinutes) + "\n" +
            "🔔 重要提醒：如需取消或调整上课时间，请至少提前4小时告知学员服务中心负责人，否则系统将无法更改，仍会消耗课时。\n" +
            "🗣️ 上课小贴士：请准时进入会议室，准备好摄像头和一杯水🍵。\n" +
            "💬 请您看到消息后回复确认👌。\n\n" +
            "📞 #腾讯会议：762-3777-6304";
    }

    function buildDayMap(entries) {
        const dayMap = Object.fromEntries(WEEK_DAYS.map((d) => [d, []]));
        for (const entry of entries) {
            for (const day of entry.days) {
                if (dayMap[day]) {
                    dayMap[day].push(entry);
                }
            }
        }

        for (const day of WEEK_DAYS) {
            dayMap[day].sort((a, b) => {
                const p = (PERIOD_ORDER[a.period] || 99) - (PERIOD_ORDER[b.period] || 99);
                if (p !== 0) return p;
                if (a.time && b.time) return a.time.localeCompare(b.time);
                if (a.time) return -1;
                if (b.time) return 1;
                return a.student.localeCompare(b.student, "zh-CN");
            });
        }

        return dayMap;
    }

    function renderDayEntries(list, entries, dateValue, onChange) {
        if (entries.length === 0) {
            list.innerHTML = '<div class="empty">这一天没有排课。</div>';
            return;
        }

        list.innerHTML = "";
        entries.forEach((item) => {
            const cancelled = isCancelled(item, dateValue);

            const row = document.createElement("div");
            row.className = "class-item" + (cancelled ? " cancelled" : "");

            const time = document.createElement("span");
            time.className = "time";
            time.textContent = formatTime(item);

            const timeInput = document.createElement("input");
            timeInput.type = "time";
            timeInput.step = 60;
            timeInput.className = "inline-time-input";
            const fallbackClock = getDefaultClockByPeriod(item.period);
            timeInput.value = getOverrideClock(item, dateValue) || normalizeClockInput(item.time) || fallbackClock;
            timeInput.addEventListener("change", () => {
                const normalized = normalizeClockInput(timeInput.value);
                if (!normalized || !isValidClock(normalized)) {
                    showToast("时间格式无效，请使用 HH:mm");
                    timeInput.value = fallbackClock;
                    setOverrideClock(item, dateValue, fallbackClock);
                    return;
                }
                setOverrideClock(item, dateValue, normalized);
            });

            const student = document.createElement("span");
            student.className = "student";
            student.textContent = item.student;

            const course = document.createElement("span");
            course.className = "course";
            course.textContent = item.course;

            const duration = document.createElement("span");
            duration.className = "duration";
            duration.textContent = "(" + toHoursText(item.durationMinutes) + ")";

            const status = document.createElement("span");
            status.className = "status-tag" + (cancelled ? " cancelled" : "");
            status.textContent = cancelled ? "已请假" : "正常";

            const button = document.createElement("button");
            button.type = "button";
            button.className = "action-btn " + (cancelled ? "restore" : "cancel");
            button.textContent = cancelled ? "恢复上课" : "标记请假";
            button.addEventListener("click", () => {
                toggleCancellation(item, dateValue);
                onChange();
            });

            const remindButton = document.createElement("button");
            remindButton.type = "button";
            remindButton.className = "action-btn remind";
            remindButton.textContent = "排课申请";
            remindButton.addEventListener("click", async () => {
                const appointmentMessage = buildAppointmentMessage(item, dateValue);
                const copied = await copyTextToClipboard(appointmentMessage);
                showToast(copied ? "排课文案已复制到剪贴板" : "复制失败，请手动复制");
            });

            const notifyButton = document.createElement("button");
            notifyButton.type = "button";
            notifyButton.className = "action-btn remind";
            notifyButton.textContent = "排课通知";
            notifyButton.addEventListener("click", async () => {
                const pickedClock = normalizeClockInput(timeInput.value || "");
                if (!pickedClock || !isValidClock(pickedClock)) {
                    showToast("时间格式无效，请使用 HH:mm");
                    return;
                }
                setOverrideClock(item, dateValue, pickedClock);

                const notificationMessage = buildScheduleNotificationMessage(item, dateValue, pickedClock);
                const copied = await copyTextToClipboard(notificationMessage);
                showToast(copied ? "排课通知已复制到剪贴板" : "复制失败，请手动复制");
            });

            const actionGroup = document.createElement("div");
            actionGroup.className = "action-group";
            actionGroup.append(button, remindButton, notifyButton);

            row.append(time, timeInput, student, course, duration, status, actionGroup);
            list.appendChild(row);
        });
    }

    function renderToday(dayMap, baseDate) {
        const todayList = document.getElementById("todayList");
        const tomorrowList = document.getElementById("tomorrowList");
        const todayColumnTitle = document.getElementById("todayColumnTitle");
        const tomorrowColumnTitle = document.getElementById("tomorrowColumnTitle");
        const selectedDayText = document.getElementById("selectedDayText");
        const dailyTotal = document.getElementById("dailyTotal");
        const todayDay = getDayFromDateInput(baseDate);
        const tomorrowDate = addDays(baseDate, 1);
        const tomorrowDay = getDayFromDateInput(tomorrowDate);

        const todayEntries = dayMap[todayDay] || [];
        const tomorrowEntries = dayMap[tomorrowDay] || [];

        const todayMinutes = todayEntries
            .filter((item) => !isCancelled(item, baseDate))
            .reduce((sum, item) => sum + item.durationMinutes, 0);
        const todayCancelledCount = todayEntries.filter((item) => isCancelled(item, baseDate)).length;

        const tomorrowMinutes = tomorrowEntries
            .filter((item) => !isCancelled(item, tomorrowDate))
            .reduce((sum, item) => sum + item.durationMinutes, 0);
        const tomorrowCancelledCount = tomorrowEntries.filter((item) => isCancelled(item, tomorrowDate)).length;

        selectedDayText.textContent = "今日对应：" + todayDay;
        dailyTotal.textContent = "今日应上：" + toHoursText(todayMinutes) + "（请假" + todayCancelledCount + "节）";

        todayColumnTitle.textContent = "今日（" + getDateLabel(baseDate) + " · " + todayDay + " · 应上" + toHoursText(todayMinutes) + "）";
        tomorrowColumnTitle.textContent = "明日（" + getDateLabel(tomorrowDate) + " · " + tomorrowDay + " · 应上" + toHoursText(tomorrowMinutes) + "）";
        if (tomorrowCancelledCount > 0) {
            tomorrowColumnTitle.textContent += " · 请假" + tomorrowCancelledCount + "节";
        }

        renderDayEntries(todayList, todayEntries, baseDate, () => {
            renderToday(dayMap, baseDate);
            renderWeek(dayMap, baseDate);
        });
        renderDayEntries(tomorrowList, tomorrowEntries, tomorrowDate, () => {
            renderToday(dayMap, baseDate);
            renderWeek(dayMap, baseDate);
        });
    }

    function getMondayOfWeek(dateValue) {
        const date = new Date(dateValue + "T00:00:00");
        const day = date.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        date.setDate(date.getDate() + diff);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + d;
    }

    function renderWeek(dayMap, baseDate) {
        const weekGrid = document.getElementById("weekGrid");
        const weeklyTotal = document.getElementById("weeklyTotal");
        const weekStart = getMondayOfWeek(baseDate);

        let weekMinutes = 0;
        let weekCancelledCount = 0;
        weekGrid.innerHTML = WEEK_DAYS.map((day) => {
            const dayIndex = WEEK_DAYS.indexOf(day);
            const dayDate = addDays(weekStart, dayIndex);
            const items = dayMap[day] || [];
            const dayMinutes = items
                .filter((item) => !isCancelled(item, dayDate))
                .reduce((sum, item) => sum + item.durationMinutes, 0);
            const dayCancelledCount = items.filter((item) => isCancelled(item, dayDate)).length;
            weekCancelledCount += dayCancelledCount;
            weekMinutes += dayMinutes;
            const rows = items.length
                ? items.map((it) => {
                    const cancelled = isCancelled(it, dayDate);
                    return '<div class="mini-item' + (cancelled ? ' cancelled' : '') + '">' +
                        '<strong>' + formatTime(it) + '</strong><br>' +
                        it.student + ' · ' + it.course + ' · ' + toHoursText(it.durationMinutes) +
                        '<br><span class="mini-status">' + (cancelled ? '已请假' : '正常') + '</span>' +
                        '</div>';
                }).join("")
                : '<div class="empty">无排课</div>';

            return '<article class="day-card">' +
                '<h3>' + day + '</h3>' +
                '<div class="day-meta">日期：' + dayDate + ' · 应上：' + toHoursText(dayMinutes) + ' · 请假' + dayCancelledCount + '节</div>' +
                rows +
                '</article>';
        }).join("");

        weeklyTotal.textContent = "本周应上总课时：" + toHoursText(weekMinutes) + "（请假" + weekCancelledCount + "节）";
    }

    function init() {
        const config = getConfig();
        const dayMap = buildDayMap(config.entries || []);
        const datePicker = document.getElementById("datePicker");
        cancellationState = loadCancellations();
        timeOverrideState = loadTimeOverrides();

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        datePicker.value = yyyy + "-" + mm + "-" + dd;

        renderToday(dayMap, datePicker.value);
        renderWeek(dayMap, datePicker.value);

        datePicker.addEventListener("change", () => {
            renderToday(dayMap, datePicker.value);
            renderWeek(dayMap, datePicker.value);
        });
    }

    init();
</script>
<script type="module">
    import { loginApp } from './commonFunctions.js';

    const STUDENT_NAME_ALIAS = {
        "硕硕": "俞新硕"
    };

    const FIELD_LABEL_MAP = {
        quota30: "30分钟课时",
        quota60: "60分钟课时",
        quotaAccompany: "陪练服务时长"
    };

    function normalizeStudentName(name) {
        const trimmed = String(name || "").trim();
        return STUDENT_NAME_ALIAS[trimmed] || trimmed;
    }

    function isZero(value) {
        const raw = String(value ?? "").trim();
        const numeric = parseFloat(raw);
        return raw === "0" || (Number.isFinite(numeric) && numeric === 0);
    }

    function formatFieldLabels(fields) {
        return (fields || []).map((field) => FIELD_LABEL_MAP[field] || field).join("、");
    }

    function collectQuotaNeeds(entries) {
        const needsMap = new Map();

        for (const entry of entries || []) {
            const displayName = String(entry?.student || "").trim();
            if (!displayName) continue;

            const queryName = normalizeStudentName(displayName);
            const durationHours = Number(entry?.durationMinutes) / 60;

            if (!needsMap.has(queryName)) {
                needsMap.set(queryName, {
                    displayNames: new Set(),
                    requiredFields: new Set()
                });
            }

            const target = needsMap.get(queryName);
            target.displayNames.add(displayName);

            if (Math.abs(durationHours - 0.5) < 0.001) {
                target.requiredFields.add("quota30");
            } else if (Math.abs(durationHours - 1) < 0.001) {
                target.requiredFields.add("quota60");
            } else {
                // 兜底：非 0.5/1 小时课程同时检查 30/60 分钟余额
                target.requiredFields.add("quota30");
                target.requiredFields.add("quota60");
            }
        }

        return needsMap;
    }

    async function copyToClipboard(text) {
        if (typeof window.copyTextToClipboard === "function") {
            return window.copyTextToClipboard(text);
        }

        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return true;
            }
            return false;
        } catch (_) {
            return false;
        }
    }

    async function checkQuotaFromSchedule(entries) {
        let token = localStorage.getItem("x-token-c");
        if (!token) {
            await loginApp().catch(() => {});
            token = localStorage.getItem("x-token-c");
            if (!token) {
                window.showToast?.("未找到 token，请先配置登录信息");
                return;
            }
        }

        const quotaNeeds = collectQuotaNeeds(entries);
        if (quotaNeeds.size === 0) {
            window.showToast?.("未找到可检查的学员");
            return;
        }

        const resp = await fetch("https://api.lxll.com/request/CustomerTeacherListClient", {
            method: "POST",
            headers: {
                "accept": "application/json, text/plain, */*",
                "content-type": "application/json",
                "origin": "https://h5.lxll.com",
                "referer": "https://h5.lxll.com/",
                "x-token-c": token,
                "x-ua": "ct=1&version=5.0.6",
                "x-user-id": localStorage.getItem("x-user-id") || "144620"
            },
            body: JSON.stringify({
                pageNumber: 1,
                pageSize: 100,
                whereCriteria: { studentName: "" }
            })
        });

        if (!resp.ok) {
            throw new Error("网络错误 " + resp.status);
        }

        const data = await resp.json();
        const list = Array.isArray(data?.data?.data) ? data.data.data : [];
        const apiMap = new Map(
            list.map((item) => [String(item?.userName || "").trim(), item])
        );
        const checkedRows = [];
        const anomalies = [];

        for (const [queryName, requirement] of quotaNeeds.entries()) {
            const item = apiMap.get(queryName);
            const displayName = [...requirement.displayNames].join("/");

            if (!item) {
                checkedRows.push({
                    queryName,
                    displayName,
                    quota30: "-",
                    quota60: "-",
                    quotaAccompany: "-",
                    statusType: "missing",
                    statusText: "系统未查到",
                    zeroFields: ["quota30", "quota60", "quotaAccompany"]
                });

                anomalies.push({
                    queryName,
                    displayNames: [...requirement.displayNames],
                    quota30: "-",
                    quota60: "-",
                    quotaAccompany: "-",
                    zeroFields: ["quota30", "quota60", "quotaAccompany"],
                    isMissingStudent: true
                });
                continue;
            }

            const zeroFields = [];

            for (const field of requirement.requiredFields) {
                if (isZero(item?.[field])) zeroFields.push(field);
            }

            if (isZero(item?.quotaAccompany)) {
                zeroFields.push("quotaAccompany");
            }

            const statusType = zeroFields.length > 0 ? "warn" : "ok";
            const statusText = zeroFields.length > 0
                ? ("异常：" + formatFieldLabels(zeroFields))
                : "正常";

            checkedRows.push({
                queryName,
                displayName,
                quota30: item?.quota30 ?? "-",
                quota60: item?.quota60 ?? "-",
                quotaAccompany: item?.quotaAccompany ?? "-",
                statusType,
                statusText,
                zeroFields
            });

            if (zeroFields.length > 0) {
                anomalies.push({
                    queryName,
                    displayNames: [...requirement.displayNames],
                    quota30: item?.quota30,
                    quota60: item?.quota60,
                    quotaAccompany: item?.quotaAccompany,
                    zeroFields
                });
            }
        }

        renderQuotaCheckResults(checkedRows);

        if (anomalies.length === 0) {
            window.showToast?.("课时检查完成，未发现异常");
            return;
        }

        const detailLines = anomalies.map((entry) => {
            const displayName = entry.displayNames.join("/");
            const systemNameTip = displayName === entry.queryName ? "" : `（系统名：${entry.queryName}）`;
            const missingFieldsText = formatFieldLabels(entry.zeroFields);
            if (entry.isMissingStudent) {
                return `学员${displayName}${systemNameTip}在系统未查到，需核对学员名称；待核对课时：${missingFieldsText}`;
            }
            return `请帮忙为${displayName}${systemNameTip}充值：缺失课时[${missingFieldsText}]；当前"30分钟剩余"为 ${entry.quota30 ?? "-"}、"60分钟剩余"为 ${entry.quota60 ?? "-"}，"陪练服务时长剩余"为${entry.quotaAccompany ?? "-"}`;
        });

        const alertMsg = `发现异常学生(${anomalies.length})：\n${detailLines.join("\n")}`;
        const copied = await copyToClipboard(alertMsg);
        window.showToast?.(copied ? "异常文案已复制到剪贴板" : "复制失败，请手动复制");
        alert(alertMsg);
    }

    function renderQuotaCheckResults(rows) {
        const metaEl = document.getElementById("quotaCheckMeta");
        const container = document.getElementById("quotaCheckResults");
        if (!metaEl || !container) return;

        if (!rows || rows.length === 0) {
            metaEl.textContent = "未找到可展示的查询结果。";
            container.className = "empty";
            container.textContent = "暂无查询结果。";
            return;
        }

        const now = new Date();
        const timeLabel = now.getFullYear() + "-" +
            String(now.getMonth() + 1).padStart(2, "0") + "-" +
            String(now.getDate()).padStart(2, "0") + " " +
            String(now.getHours()).padStart(2, "0") + ":" +
            String(now.getMinutes()).padStart(2, "0") + ":" +
            String(now.getSeconds()).padStart(2, "0");
        metaEl.textContent = "最近一次查询时间：" + timeLabel + " · 学生数：" + rows.length;

        const table = document.createElement("table");
        table.className = "quota-result-table";
        table.innerHTML =
            "<thead><tr>" +
            "<th>排课学生</th>" +
            "<th>系统查询名</th>" +
            "<th>30分钟剩余</th>" +
            "<th>60分钟剩余</th>" +
            "<th>陪练服务时长剩余</th>" +
            "<th>状态</th>" +
            "</tr></thead>";

        const tbody = document.createElement("tbody");
        rows.forEach((row) => {
            const tr = document.createElement("tr");
            tr.className = row.statusType === "missing"
                ? "quota-row-missing"
                : (row.statusType === "warn" ? "quota-row-warning" : "");

            const statusClass = row.statusType === "missing"
                ? "quota-status missing"
                : (row.statusType === "warn" ? "quota-status warn" : "quota-status");

            const appendCell = (value, fieldName) => {
                const td = document.createElement("td");
                td.textContent = value;
                if ((row.zeroFields || []).includes(fieldName)) {
                    td.className = "quota-cell-danger";
                }
                tr.appendChild(td);
            };

            appendCell(row.displayName);
            appendCell(row.queryName);
            appendCell(String(row.quota30), "quota30");
            appendCell(String(row.quota60), "quota60");
            appendCell(String(row.quotaAccompany), "quotaAccompany");

            const statusTd = document.createElement("td");
            statusTd.innerHTML = "<span class=\"" + statusClass + "\">" + row.statusText + "</span>";
            tr.appendChild(statusTd);
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        container.className = "";
        container.innerHTML = "";
        container.appendChild(table);
    }

    const viewTotalHoursButton = document.getElementById("viewTotalHoursButton");
    viewTotalHoursButton?.addEventListener("click", async () => {
        try {
            const configRaw = document.getElementById("schedule-config")?.textContent || "{}";
            const config = JSON.parse(configRaw);
            await checkQuotaFromSchedule(config.entries || []);
        } catch (error) {
            console.error("课时检查失败:", error);
            window.showToast?.("课时检查失败，请稍后重试");
        }
    });
</script>
