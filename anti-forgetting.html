    <style>

<script type="module">
    import * as commonFunctions from './commonFunctions.js?v=20260428-1';

    const SCHEDULE_CONFIG_OVERRIDE_KEY = 'schedule-config-override-v1';
    const CUSTOM_STUDENTS_STORAGE_KEY = 'custom-students-v1';
    const EXTRA_ENTRIES_STORAGE_KEY = 'schedule-extra-entries-v1';

    function normalizeStudentName(value) {
        const trimmed = String(value || '').trim();
        const aliasApi = window.StudentNameAlias;
        if (aliasApi && typeof aliasApi.normalizeStudentName === 'function') {
            return aliasApi.normalizeStudentName(trimmed);
        }
        return trimmed;
    }

    function getCanonicalStudentEntries(studentNames) {
        const aliasApi = window.StudentNameAlias;
        const aliasMap = aliasApi && aliasApi.STUDENT_NAME_ALIAS ? aliasApi.STUDENT_NAME_ALIAS : {};
        const entriesByCanonicalName = new Map();

        studentNames.forEach((studentName) => {
            const displayName = String(studentName || '').trim();
            if (!displayName) return;

            const canonicalName = normalizeStudentName(displayName);
            const prefersAliasDisplay = aliasMap[displayName] === canonicalName;
            const existing = entriesByCanonicalName.get(canonicalName);

            if (!existing || prefersAliasDisplay) {
                entriesByCanonicalName.set(canonicalName, {
                    displayName,
                    canonicalName
                });
            }
        });

        return Array.from(entriesByCanonicalName.values()).sort((a, b) => a.displayName.localeCompare(b.displayName, 'zh-CN'));
    }

    function getDisplayedStudentNames() {
        return Array.from(document.getElementById('userName').options)
            .map((option) => String(option?.value || '').trim())
            .filter(Boolean);
    }

    async function loadStudentOptions() {
        const userNameSelect = document.getElementById('userName');
        const students = new Set();

        try {
            const overrideRaw = localStorage.getItem(SCHEDULE_CONFIG_OVERRIDE_KEY);
            const overrideConfig = overrideRaw ? JSON.parse(overrideRaw) : null;
            if (overrideConfig && Array.isArray(overrideConfig.entries)) {
                (overrideConfig.entries || []).forEach((entry) => {
                    const name = String(entry?.student || '').trim();
                    if (name) students.add(name);
                });
            }
        } catch (_) {
            // fallback below
        }

        try {
            const customRaw = localStorage.getItem(CUSTOM_STUDENTS_STORAGE_KEY);
            const customStudents = customRaw ? JSON.parse(customRaw) : [];
            (Array.isArray(customStudents) ? customStudents : []).forEach((name) => {
                const trimmed = String(name || '').trim();
                if (trimmed) students.add(trimmed);
            });
        } catch (_) {
            // fallback below
        }

        // 支持“临时加课”写入的学生名
        try {
            const extraRaw = localStorage.getItem(EXTRA_ENTRIES_STORAGE_KEY);
            const extraState = extraRaw ? JSON.parse(extraRaw) : {};
            Object.values(extraState || {}).forEach((rows) => {
                (Array.isArray(rows) ? rows : []).forEach((entry) => {
                    const name = String(entry?.student || '').trim();
                    if (name) students.add(name);
                });
            });
        } catch (_) {
            // fallback below
        }

        try {
            const resp = await fetch('./schedule.html', { cache: 'no-store' });
            if (resp.ok) {
                const html = await resp.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const configText = doc.getElementById('schedule-config')?.textContent || '{}';
                const config = JSON.parse(configText);
                (config.entries || []).forEach((entry) => {
                    if (entry && entry.student) students.add(String(entry.student).trim());
                });
            }
        } catch (_) {
            // fallback below
        }

        for (let i = 0; i < localStorage.length; i += 1) {
            const key = localStorage.key(i) || '';
            if (key.endsWith('_classStatistics')) {
                const name = key.replace(/_classStatistics$/, '').trim();
                if (name) students.add(name);
            }
        }

        const sorted = commonFunctions.filterLegacyStudents(Array.from(students)).sort((a, b) => a.localeCompare(b, 'zh-CN'));
        userNameSelect.innerHTML = '';
        sorted.forEach((name) => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            userNameSelect.appendChild(opt);
        });

        if (sorted.length === 0) {
            const opt = document.createElement('option');
            opt.value = '同学';
            opt.textContent = '同学';
            userNameSelect.appendChild(opt);
        }
    }

    function setDefaultReviewTime() {
        const input = document.getElementById('reviewTime');
        if (input.value) return;
        const now = new Date();
        now.setHours(19, 30, 0, 0);
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        input.value = `${y}-${m}-${d}T${hh}:${mm}`;
    }

    // ── 切换学员：自动清空表单 ──
    function clearFormFields() {
        document.querySelectorAll('.antiForgettingReviewWord').forEach(el => { el.value = ''; });
        document.getElementById('antiForgettingForgetWord').value = '0';
        document.getElementById('forgetWords').value = '';
        document.getElementById('pronounceWords').value = '';
        document.getElementById('keyLanguagePoints').value = '';
        document.getElementById('practiceArea').value = '';
    }

    document.getElementById('userName').addEventListener('change', clearFormFields);

    // ── 复习计划核对功能 ──
    const REVIEW_OFFSETS = [1, 2, 3, 6, 9, 12, 15, 17, 19, 21];

    // 独立获取学生列表（不修改现有逻辑）
    function getStudentsForScheduleCheck() {
        const students = new Set();
        
        // 1. teacherData 硬编码数据
        const teacherDataKeys = ['liTeacher', 'shiTeacher'];
        teacherDataKeys.forEach(teacherKey => {
            const usersKey = `teacherData_${teacherKey}_users`;
            // 从 localStorage 读取（如果存在）
            try {
                const stored = localStorage.getItem(usersKey);
                if (stored) {
                    const users = JSON.parse(stored);
                    Object.keys(users || {}).forEach(name => students.add(name));
                }
            } catch (_) {}
        });
        
        // 2. localStorage 自定义学生
        try {
            const custom = JSON.parse(localStorage.getItem(CUSTOM_STUDENTS_STORAGE_KEY) || '[]');
            custom.forEach(name => students.add(name));
        } catch (_) {}
        
        // 3. 排课配置学生
        try {
            const override = JSON.parse(localStorage.getItem(SCHEDULE_CONFIG_OVERRIDE_KEY) || 'null');
            (override?.entries || []).forEach(entry => {
                if (entry?.student) students.add(entry.student);
            });
        } catch (_) {}
        
        // 4. 临时加课学生
        try {
            const extraState = JSON.parse(localStorage.getItem(EXTRA_ENTRIES_STORAGE_KEY) || '{}');
            Object.values(extraState || {}).forEach((rows) => {
                (Array.isArray(rows) ? rows : []).forEach((entry) => {
                    if (entry?.student) students.add(entry.student);
                });
            });
        } catch (_) {}
        
        // 5. classStatistics 键中的学生名
        for (let i = 0; i < localStorage.length; i += 1) {
            const key = localStorage.key(i) || '';
            if (key.endsWith('_classStatistics')) {
                const name = key.replace(/_classStatistics$/, '').trim();
                if (name) students.add(name);
            }
        }
        
        return [...students].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    }

    // 日期工具函数
    function parseDate(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr + 'T00:00:00');
        return isNaN(d.getTime()) ? null : d;
    }

    function formatDate(date) {
        if (!date) return '';
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
    }

    function isSameDay(d1, d2) {
        return formatDate(d1) === formatDate(d2);
    }

    function toTimestampFromYmd(ymd) {
        const d = parseDate(ymd);
        return d ? d.getTime() : NaN;
    }

    function getSelectedReviewDate() {
        const reviewInput = document.getElementById('reviewTime');
        const raw = String(reviewInput?.value || '').trim();
        if (!raw) return formatDate(new Date());
        const m = raw.match(/^(\d{4})[-\/](\d{2})[-\/](\d{2})/);
        if (!m) return formatDate(new Date(raw));
        return `${m[1]}-${m[2]}-${m[3]}`;
    }

    function extractTrainingDateFromRecord(record) {
        const raw = record?.trainingTime || record?.trainingDate || record?.date || record?.orderTime || record?.scheduleTime || record?.scheduleDate;
        if (!raw) return null;

        if (typeof raw === 'string') {
            const maybeYmd = raw.slice(0, 10);
            if (/^\d{4}-\d{2}-\d{2}$/.test(maybeYmd)) {
                return parseDate(maybeYmd);
            }
        }

        const parsed = new Date(raw);
        if (Number.isNaN(parsed.getTime())) return null;
        parsed.setHours(0, 0, 0, 0);
        return parsed;
    }

    function getScheduleBoardProxyCandidates(query) {
        const suffix = query ? `?${query}` : '';
        return [
            `/.netlify/functions/schedule-board${suffix}`,
            `/netlify/functions/schedule-board${suffix}`
        ];
    }

    async function postScheduleBoardWithFallback(query, payload, operationName) {
        const candidates = getScheduleBoardProxyCandidates(query);
        let lastFailureStatus = null;
        let lastFailureError = null;
        let sawMethodNotSupported = false;

        for (const url of candidates) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 404) {
                    lastFailureStatus = response.status;
                    continue;
                }

                if (response.status === 501) {
                    sawMethodNotSupported = true;
                    lastFailureStatus = response.status;
                    continue;
                }

                return response;
            } catch (error) {
                lastFailureError = error;
            }
        }

        if (lastFailureStatus === 404) {
            throw new Error(`${operationName}失败：未找到 Netlify Functions 代理接口，请使用 npm run dev:local 启动本地环境后重试。`);
        }

        if (sawMethodNotSupported || lastFailureStatus === 501) {
            throw new Error(`${operationName}失败：当前服务不支持 POST（HTTP 501）。你正在使用静态服务器，请改用 npm run dev:local 启动本地环境后重试。`);
        }

        if (lastFailureError) {
            throw new Error(`${operationName}失败：代理请求异常（${lastFailureError.message || 'unknown error'}）`);
        }

        throw new Error(`${operationName}失败：代理请求不可用。`);
    }

    // 获取已完成训练记录（通过 Netlify function 代理）
    async function fetchCompletedTrainingRecords(token, userId) {
        const allRecords = [];
        let pageNumber = 1;
        const pageSize = 500;
        const seenPageSignatures = new Set();
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const cutoffDate = addDays(today, -21);
        
        while (true) {
            try {
                // 使用 Netlify function 作为代理来解决 CORS 问题
                const response = await postScheduleBoardWithFallback(
                    `mode=completed&pageNumber=${pageNumber}&pageSize=${pageSize}`,
                    { token, userId, xUa: 'ct=2&v=5.0.96' },
                    '获取已完成训练记录'
                );
                
                if (!response.ok) {
                    throw new Error(`代理请求失败: HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const records = data?.data?.data || [];
                
                if (records.length === 0) break;

                const recordsWithDate = records
                    .map((record) => ({ record, trainingDate: extractTrainingDateFromRecord(record) }))
                    .filter((item) => item.trainingDate);

                const hasRecentRecord = recordsWithDate.some((item) => item.trainingDate >= cutoffDate);
                const hasAnyDatedRecord = recordsWithDate.length > 0;

                const pageSignature = records
                    .slice(0, 5)
                    .map((r) => String(r?.id || r?.orderId || r?.scheduleId || r?.trainingTime || r?.orderTime || ''))
                    .join('|') + `:${records.length}`;
                if (seenPageSignatures.has(pageSignature)) {
                    console.warn('fetchCompletedTrainingRecords 检测到重复分页结果，提前终止，避免循环请求', { pageNumber, pageSignature });
                    break;
                }
                seenPageSignatures.add(pageSignature);

                // 仅保留可能产生 today 及未来复习计划的训练记录（today-21 及之后）
                const recentRecords = recordsWithDate
                    .filter((item) => item.trainingDate >= cutoffDate)
                    .map((item) => item.record);
                allRecords.push(...recentRecords);

                // training/orders 在生产中按时间倒序返回：当整页都早于 cutoff，可提前终止后续分页
                if (hasAnyDatedRecord && !hasRecentRecord) {
                    console.log('fetchCompletedTrainingRecords 命中 today-21 截止，提前结束分页', {
                        pageNumber,
                        cutoffDate: formatDate(cutoffDate)
                    });
                    break;
                }
                
                // 首先按当前页返回条数判断末页，避免 total/pageSize 字段异常导致循环
                const apiPageSizeRaw = Number(data?.data?.pageSize ?? data?.data?.size);
                const apiPageSize = Number.isFinite(apiPageSizeRaw) && apiPageSizeRaw > 0 ? apiPageSizeRaw : pageSize;
                if (records.length < apiPageSize) break;

                // 仅在 total 合法时使用 totalPages 作为辅助终止条件
                const totalRaw = Number(data?.data?.total);
                if (Number.isFinite(totalRaw) && totalRaw >= 0) {
                    const totalPages = Math.ceil(totalRaw / apiPageSize);
                    if (pageNumber >= totalPages) break;
                }

                // 最后兜底，避免上游异常时无限循环
                if (pageNumber >= 1000) {
                    console.warn('fetchCompletedTrainingRecords 触发分页上限保护，提前终止', { pageNumber });
                    break;
                }
                
                pageNumber++;
            } catch (error) {
                console.error('fetchCompletedTrainingRecords 错误:', error);
                throw error;
            }
        }
        
        return allRecords;
    }

    // 计算复习计划
    function calculateReviewSchedule(trainingRecords, targetStudent) {
        const reviewSchedule = new Map(); // reviewDate -> [reviewItems]
        const targetCanonicalName = normalizeStudentName(targetStudent);
        
        trainingRecords.forEach(record => {
            const studentName = (
                record.userName ||
                record.studentName ||
                record.trainerName ||
                record.student?.name ||
                ''
            ).trim();
            if (normalizeStudentName(studentName) !== targetCanonicalName) return;
            
            const trainingDate = extractTrainingDateFromRecord(record);
            if (!trainingDate) return;
            
            // 只计算从今天开始的复习计划
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            REVIEW_OFFSETS.forEach(offset => {
                const reviewDate = addDays(trainingDate, offset);
                if (reviewDate < today) return; // 跳过已过期的复习日期
                const reviewDateStr = formatDate(reviewDate);
                
                const reviewItem = {
                    trainingDate: formatDate(trainingDate),
                    reviewDate: reviewDateStr,
                    offset: offset,
                    student: targetStudent,
                    courseType: record.courseName || record.type || record.category || record.material?.name || record.materialName || '词汇课'
                };
                
                if (!reviewSchedule.has(reviewDateStr)) {
                    reviewSchedule.set(reviewDateStr, []);
                }
                reviewSchedule.get(reviewDateStr).push(reviewItem);
            });
        });
        
        return reviewSchedule;
    }

    // 获取实际复习列表（通过 Netlify function 代理解决 CORS）
    async function fetchActualReviewList(token, userId, studentName, startDate, endDate) {
        try {
            const displayStudentName = String(studentName || '').trim();
            const normalizedStudentName = normalizeStudentName(displayStudentName);
            if (!normalizedStudentName) {
                console.warn('fetchActualReviewList 跳过请求：studentName 为空');
                return [];
            }

            // 使用 schedule-board function 的 proxy 功能
            const response = await postScheduleBoardWithFallback(
                '',
                {
                    token,
                    userId,
                    xUa: 'ct=2&v=5.0.96',
                    mode: 'anti-forgetting-list',
                    studentName: normalizedStudentName,
                    startDate,
                    endDate
                },
                '获取实际复习列表'
            );
            
            if (!response.ok) {
                const errorText = await response.text();
                console.warn('fetchActualReviewList 代理请求失败，返回空列表', {
                    status: response.status,
                    response: errorText
                });
                return [];
            }
            
            const data = await response.json();
            const list = data?.data;

            // 兼容旧接口结构：{ data: { data: [...] } } 或 { data: [...] }
            if (Array.isArray(data?.data?.data)) {
                return data.data.data;
            }
            if (!Array.isArray(list)) {
                return Array.isArray(list) ? list : [];
            }

            // 线上真实接口结构：[{ time, students:[{ studentName, antiForgets:[{ trainTime, ... }] }] }]
            const startTs = toTimestampFromYmd(startDate);
            const endTs = toTimestampFromYmd(endDate);
            return list.flatMap((day) => {
                const reviewDate = formatDate(new Date(Number(day?.time || 0)));
                const reviewTs = toTimestampFromYmd(reviewDate);
                if (!reviewDate || !Number.isFinite(reviewTs)) return [];
                if (Number.isFinite(startTs) && reviewTs < startTs) return [];
                if (Number.isFinite(endTs) && reviewTs > endTs) return [];

                const students = Array.isArray(day?.students) ? day.students : [];
                const targetStudent = students.find((s) => normalizeStudentName(s?.studentName) === normalizedStudentName);
                if (!targetStudent) return [];

                const antiForgets = Array.isArray(targetStudent?.antiForgets) ? targetStudent.antiForgets : [];
                return antiForgets.map((item) => {
                    const trainingDate = formatDate(new Date(Number(item?.trainTime || 0)));
                    return {
                        reviewDate,
                        trainingDate,
                        sourceDate: trainingDate,
                        studentName: displayStudentName,
                        canonicalStudentName: normalizedStudentName,
                        materialName: item?.materialName || '',
                        antiForgetId: item?.antiForgetId,
                        status: item?.status
                    };
                }).filter((item) => item.trainingDate);
            });
        } catch (error) {
            console.error('fetchActualReviewList 错误:', error);
            return [];
        }
    }

    // 计算实际复习偏移（用于多排场景）
    function calculateActualOffset(trainingDate, reviewDate) {
        const training = parseDate(trainingDate);
        const review = parseDate(reviewDate);
        if (!training || !review) return null;
        const diffTime = review.getTime() - training.getTime();
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
        return diffDays > 0 ? diffDays : null;
    }

    // 对比差异
    function compareSchedules(expectedSchedule, actualList) {
        const diff = {
            normal: [],
            missing: [],
            extra: [],
            summary: { normal: 0, missing: 0, extra: 0 }
        };
        
        // 构建实际复习 Map
        const actualMap = new Map();
        actualList.forEach(item => {
            const reviewDate = formatDate(parseDate(item.reviewDate || item.date));
            if (!reviewDate) return;
            if (!actualMap.has(reviewDate)) {
                actualMap.set(reviewDate, []);
            }
            actualMap.get(reviewDate).push(item);
        });
        
        const processedReviewDates = new Set();

        // 遍历预期计划
        expectedSchedule.forEach((items, reviewDate) => {
            processedReviewDates.add(reviewDate);
            const actualItems = actualMap.get(reviewDate) || [];

            // 去重比较：以 trainingDate 为粒度
            const expectedByTrainingDate = new Map();
            items.forEach((item) => {
                const key = String(item?.trainingDate || '').trim();
                if (!key) return;
                if (!expectedByTrainingDate.has(key)) {
                    expectedByTrainingDate.set(key, item);
                }
            });

            const actualByTrainingDate = new Map();
            actualItems.forEach((item) => {
                const key = formatDate(parseDate(item.trainingDate || item.sourceDate));
                if (!key) return;
                if (!actualByTrainingDate.has(key)) {
                    actualByTrainingDate.set(key, item);
                }
            });

            expectedByTrainingDate.forEach((expected, trainingDate) => {
                if (actualByTrainingDate.has(trainingDate)) {
                    diff.normal.push({ ...expected, status: 'normal' });
                    diff.summary.normal++;
                } else {
                    diff.missing.push({ ...expected, status: 'missing' });
                    diff.summary.missing++;
                }
            });

            actualByTrainingDate.forEach((actual, trainingDate) => {
                if (!expectedByTrainingDate.has(trainingDate)) {
                    const actualOffset = calculateActualOffset(actual.trainingDate || actual.sourceDate, reviewDate);
                    diff.extra.push({
                        ...actual,
                        reviewDate: reviewDate,
                        status: 'extra',
                        actualOffset: actualOffset,
                        expectedOffsets: []
                    });
                    diff.summary.extra++;
                }
            });
        });

        // 处理实际存在但预期不存在的日期，全部判定为多排
        actualMap.forEach((items, reviewDate) => {
            if (processedReviewDates.has(reviewDate)) return;
            items.forEach((actual) => {
                const actualOffset = calculateActualOffset(actual.trainingDate || actual.sourceDate, reviewDate);
                diff.extra.push({
                    ...actual,
                    reviewDate: reviewDate,
                    status: 'extra',
                    actualOffset: actualOffset,
                    expectedOffsets: []
                });
                diff.summary.extra++;
            });
        });
        
        return diff;
    }

        const csvContent = '\uFEFF' + csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        
        // 触发下载
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        const today = new Date().toISOString().split('T')[0];
        link.download = `复习计划核对结果_${today}.csv`;
        link.click();
    });

    // 保存最后核对结果供导出使用
    const originalRender = renderScheduleCheckResult;
    renderScheduleCheckResult = function(diff, studentName, checkDate) {
        lastCheckResult = diff;
        return originalRender(diff, studentName, checkDate);
    };

    document.getElementById('navigateToFormalClass').addEventListener('click', commonFunctions.navigateToFormalClass);
    document.getElementById('navigateToSchedulePage').addEventListener('click', () => {
        window.location.href = 'schedule.html';
    });
    document.getElementById('navigateToReadClass').addEventListener('click', commonFunctions.navigateToReadClass);
    document.getElementById('wordSelfCheckButton').addEventListener('click', commonFunctions.navigateToLearnWords);

    document.getElementById('antiForgettingFeedbackButton').addEventListener('click', commonFunctions.handleAntiForgettingFeedbackClick);
    document.getElementById('newFeedbackButton').addEventListener('click', commonFunctions.handleNewVersionFeedbackClick);
    document.getElementById('generateForgetWordsMP3Button').addEventListener('click', commonFunctions.generateForgetWordsMP3);
    document.getElementById('generatePronounceWordsMP3Button').addEventListener('click', commonFunctions.generatePronounceWordsMP3);

    commonFunctions.addRightClickPasteEvent(document.getElementById('forgetWords'));
    commonFunctions.addRightClickPasteEvent(document.getElementById('pronounceWords'));
    commonFunctions.addRightClickPasteEvent(document.getElementById('keyLanguagePoints'));
    commonFunctions.addRightClickPasteEvent(document.getElementById('practiceArea'));
    commonFunctions.initTtsPrefixMaintenanceUI();

    setDefaultReviewTime();
    setReviewScheduleExpanded(false);
    loadStudentOptions();
</script>
